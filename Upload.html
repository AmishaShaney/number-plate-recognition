{% extends "layout1.html" %}
{% block title %} 
Upload Files - Number Plate Recognition
{% endblock %}
{% block style %} 
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background-color: #000;
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }
    .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
    }
    .main-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        padding-top: 60px;
    }
    .upload-section {
        display: flex;
        gap: 40px;
    }
    .card-custom {
        background-color: #1e1e1e;
        padding: 40px;
        border-radius: 15px;
        width: 400px;
        height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .card-custom i {
        font-size: 80px;
        color: orange;
        margin-bottom: 15px;
    }
    .upload-btn {
        background-color: #007bff;
        color: white;
        padding: 15px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 15px;
        font-size: 18px;
    }
    .upload-btn:hover {
        background-color: #0056b3;
    }
    input[type="file"] {
        display: none;
    }
</style>
{% endblock %}
{% block content %}
<div class="main-container">
    <div class="upload-section">
        <div class="card-custom text-center">
            <i class="fas fa-image"></i>
            <h3>Upload Image</h3>
            <label for="image-upload" class="upload-btn">Choose Image</label>
            <input type="file" id="image-upload" accept="image/*">
        </div>
        <div class="card-custom text-center">
            <i class="fas fa-video"></i>
            <h3>Upload Video</h3>
            <label for="video-upload" class="upload-btn">Choose Video</label>
            <input type="file" id="video-upload" accept="video/*">
        </div>
    </div>
</div>
{% endblock %}
