<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Files - Number Plate Recognition</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: white;
            text-align: center;
        }
        .upload-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .card-custom {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }
        .card-custom i {
            font-size: 50px;
            color: orange;
        }
        .upload-btn {
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .upload-btn:hover {
            background-color: #0056b3;
        }
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Upload Videos and Images</h1>
        <p>Select a file to upload for car number plate detection.</p>
        <div class="upload-section d-flex justify-content-center flex-wrap">
            <div class="card-custom text-center p-3 m-2">
                <i class="fas fa-image"></i>
                <h3>Upload Image</h3>
                <label for="image-upload" class="upload-btn">Choose Image</label>
                <input type="file" id="image-upload" accept="image/*">
            </div>
            <div class="card-custom text-center p-3 m-2">
                <i class="fas fa-video"></i>
                <h3>Upload Video</h3>
                <label for="video-upload" class="upload-btn">Choose Video</label>
                <input type="file" id="video-upload" accept="video/*">
            </div>
        </div>
    </div>
</body>
</html>
