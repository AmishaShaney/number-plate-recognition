{% extends "layout1.html" %}
{% block title %} 
Upload Files - Number Plate Recognition
{% endblock %}
{% block style %} 
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    @import url('https://fonts.googleapis.com/css?family=Amatic+SC');

    body {
        background-color: #000;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .main-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .upload-section {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        transition: all 0.3s ease-in-out;
    }

    .card-custom {
        background-color: #1e1e1e;
        padding: 40px;
        border-radius: 15px;
        width: 400px;
        height: 300px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    .card-custom i {
        font-size: 80px;
        color: orange;
        margin-bottom: 15px;
    }

    .upload-btn {
        background-color: #007bff;
        color: white;
        padding: 15px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 15px;
        font-size: 18px;
    }

    .upload-btn:hover {
        background-color: #0056b3;
    }

    input[type="file"] {
        display: none;
    }

    /* Loading animation */
    .loading-container {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    h1 {
        font-family: 'Amatic SC', sans-serif;
        font-size: 50px;
        color: white;
        opacity: 0.8;
        animation: pulse 2s infinite;
    }

    #cooking {
        position: relative;
        width: 200px;
        height: 200px;
    }

    .bubble {
        position: absolute;
        border-radius: 100%;
        box-shadow: 0 0 5px white;
        opacity: 0;
        animation: bubble 2s infinite;
    }

    .bubble:nth-child(1) { left: 50px; width: 15px; height: 15px; background: #fff; animation-delay: 0s; }
    .bubble:nth-child(2) { left: 70px; width: 10px; height: 10px; background: #ccc; animation-delay: 0.5s; }
    .bubble:nth-child(3) { left: 90px; width: 8px; height: 8px; background: #aaa; animation-delay: 1s; }
    .bubble:nth-child(4) { left: 110px; width: 12px; height: 12px; background: #ddd; animation-delay: 1.5s; }
    .bubble:nth-child(5) { left: 130px; width: 9px; height: 9px; background: #eee; animation-delay: 2s; }

    @keyframes bubble {
        0% { transform: scale(0.5); opacity: 0; top: 50%; }
        50% { opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; top: 30%; }
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.7; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(1); opacity: 0.7; }
    }
</style>
{% endblock %}
{% block content %}

<div class="main-container">
    <!-- Upload Section (Centered) -->
    <div class="upload-section" id="upload-section">
        <div class="card-custom text-center">
            <i class="fas fa-video"></i>
            <h3>Upload Video</h3>
            <form id="upload-form" method="POST" enctype="multipart/form-data" onsubmit="showLoading()">
                {% csrf_token %}
                <label for="video-upload">Drag and drop a video or click to upload</label>
                <input type="file" id="video-upload" name="photo" accept="video/mp4, video/avi, video/mov">
                <button type="submit" class="upload-btn">Submit</button>
            </form>
        </div>
    </div>

    <!-- Loading Animation -->
    <div class="loading-container" id="loading-animation">
        <h1>Cooking in progress...</h1>
        <div id="cooking">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>
</div>

<script>
    function showLoading(event) {
        event.preventDefault(); // Prevent form from submitting immediately

        // Hide the upload form
        document.getElementById('upload-section').style.display = 'none';

        // Show the loading animation
        document.getElementById('loading-animation').style.display = 'flex';

        // Wait 2 seconds, then submit the form
        setTimeout(() => {
            document.getElementById('upload-form').submit();
        }, 2000);
    }
</script>

{% endblock %}
